<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {{ request.session.panel_name|default:'控制面板' }}
        {% if self.title %}
            - {% block title %}{% endblock %}
        {% endif %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 70px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
            background-color: #2c3e50;
            width: 240px;
        }
        .sidebar-sticky {
            position: relative;
            top: 0;
            height: calc(100vh - 48px);
            padding-top: .5rem;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .nav-link {
            color: #ecf0f1 !important;
            padding: 12px 20px !important;
            margin: 4px 0;
            border-radius: 0 30px 30px 0;
            transition: all 0.3s;
        }
        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            padding-left: 25px !important;
        }
        .nav-link.active {
            background-color: #3498db !important;
            color: white !important;
        }
        .nav-link i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        .navbar-brand {
            padding-top: .75rem;
            padding-bottom: .75rem;
        }
        .content {
            margin-left: 240px;
            padding: 20px;
            padding-top: 70px;
        }
        .card {
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border: none;
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #fff;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .stat-card {
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'dashboard:index' %}">
                <span class="panel-name">{{ request.session.panel_name|default:'控制面板' }}</span>
            </a>
            <div class="d-flex">
                <span class="navbar-text me-3">欢迎, {{ request.user.username }}</span>
                <a href="{% url 'dashboard:logout' %}" class="btn btn-outline-light btn-sm">退出登录</a>
            </div>
        </div>
    </nav>

    <!-- 侧边栏 -->
    <div class="sidebar" style="width: 240px;">
        <div class="sidebar-sticky">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}" 
                       href="{% url 'dashboard:index' %}">
                        <i class="bi bi-speedometer2"></i> 仪表盘
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'system' %}active{% endif %}"
                       href="{% url 'dashboard:system' %}">
                        <i class="bi bi-cpu"></i> 系统监控
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'websites' %}active{% endif %}"
                       href="{% url 'dashboard:websites' %}">
                        <i class="bi bi-globe"></i> 网站管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'database' %}active{% endif %}"
                       href="{% url 'dashboard:database' %}">
                       <i class="bi bi-database"></i> 数据库
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'files' %}active{% endif %}"
                       href="{% url 'dashboard:files' %}">
                        <i class="bi bi-folder"></i> 文件管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'security' %}active{% endif %}"
                       href="{% url 'dashboard:security' %}">
                        <i class="bi bi-shield"></i> 安全设置
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'cron' %}active{% endif %}"
                       href="{% url 'dashboard:cron' %}">
                        <i class="bi bi-clock"></i> 计划任务
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'settings' %}active{% endif %}"
                       href="{% url 'dashboard:settings' %}">
                        <i class="bi bi-gear"></i> 面板设置
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- 主要内容区域 -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
